// PayPal SDK — dynamically loaded from FJ_CONFIG
(function loadPayPalSDK() {
  var clientId = (window.FJ_CONFIG && window.FJ_CONFIG.payments && window.FJ_CONFIG.payments.paypalClientId) || 'test';
  var currency = (window.FJ_CONFIG && window.FJ_CONFIG.payments && window.FJ_CONFIG.payments.paypalCurrency) || 'USD';
  var script = document.createElement('script');
  script.src = 'https://www.paypal.com/sdk/js?client-id=' + encodeURIComponent(clientId) + '&currency=' + currency + '&intent=capture';
  script.setAttribute('data-namespace', 'paypal_sdk');
  script.onload = function() { if (typeof initPayPal === 'function') initPayPal(); };
  script.onerror = function() { console.warn('PayPal SDK failed to load'); };
  document.head.appendChild(script);
})();
</script>

<script>
// ========================================
// Brazil Tax Calculator
// ========================================
function calcBrazilTax(subtotalUSD) {
  const rate = 5.5;
  const subtotalBRL = subtotalUSD * rate;
  const ii = subtotalBRL * 0.60;
  const icmsRate = 0.17;
  const icmsBase = (subtotalBRL + ii) / (1 - icmsRate);
  const icms = icmsBase * icmsRate;
  const pisCofins = (subtotalBRL + icms) * 0.0925;
  const despacho = 15.00;
  const totalTaxBRL = ii + icms + pisCofins + despacho;
  return {
    rate, subtotalBRL, ii, icms, pisCofins, despacho,
    totalTaxBRL, totalTaxUSD: totalTaxBRL / rate
  };
}

function formatBRL(amount) {
  return 'R$ ' + amount.toFixed(2).replace('.', ',');
}

function showToast(msg, isError) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.style.background = isError ? '#c62828' : '#2e7d32';
  toast.style.display = 'block';
  setTimeout(() => { toast.style.display = 'none'; }, 4000);
}

// ========================================
// Country Handlers
// ========================================
function initCountryHandlers(subtotal) {
  const countrySelect = document.getElementById('country');
  countrySelect.addEventListener('change', updateForCountry);

  // Set initial state
  updateForCountry();

  function updateForCountry() {
    const country = countrySelect.value;
    const isBr = country === 'BR';

    document.getElementById('cpf-group').style.display = isBr ? 'block' : 'none';
    document.getElementById('tab-pix').style.display = isBr ? 'inline-flex' : 'none';

    if (isBr) {
      document.getElementById('cpf').setAttribute('required', '');
      document.getElementById('anvisa-notice').style.display = 'block';

      const brazilTax = calcBrazilTax(subtotal);
      document.getElementById('row-tax-us').style.display = 'none';
      document.getElementById('brazil-tax-section').style.display = 'block';
      document.getElementById('summary-shipping').textContent = (t('checkout.free') || 'FREE');
      document.getElementById('tax-subtotal-brl').textContent = formatBRL(brazilTax.subtotalBRL);
      document.getElementById('tax-ii').textContent = formatBRL(brazilTax.ii);
      document.getElementById('tax-icms').textContent = formatBRL(brazilTax.icms);
      document.getElementById('tax-pis').textContent = formatBRL(brazilTax.pisCofins);
      document.getElementById('tax-despacho').textContent = formatBRL(brazilTax.despacho);
      document.getElementById('tax-total-brl').textContent = formatBRL(brazilTax.totalTaxBRL);
      currentTotal = subtotal + brazilTax.totalTaxUSD;
      currentCurrency = 'BRL';
    } else {
      document.getElementById('cpf').removeAttribute('required');
      document.getElementById('anvisa-notice').style.display = 'none';
      document.getElementById('row-tax-us').style.display = 'flex';
      document.getElementById('brazil-tax-section').style.display = 'none';

      const shipping = subtotal >= freeShippingThreshold ? 0 : baseShippingCost;
      const tax = subtotal * 0.08;
      document.getElementById('summary-shipping').innerHTML = shipping === 0 ? '<span class="free">' + (t('checkout.free') || 'FREE') + '</span>' : formatPrice(shipping);
      document.getElementById('summary-tax').textContent = formatPrice(tax);
      currentTotal = subtotal + shipping + tax;
      currentCurrency = 'USD';
    }

    document.getElementById('summary-total').textContent = formatPrice(currentTotal);
  }

  // CPF mask
  document.getElementById('cpf').addEventListener('input', function(e) {
    let val = e.target.value.replace(/\D/g, '');
    if (val.length > 11) val = val.substring(0, 14);
    if (val.length <= 11) {
      val = val.replace(/(\d{3})(\d)/, '$1.$2');
      val = val.replace(/(\d{3})(\d)/, '$1.$2');
      val = val.replace(/(\d{3})(\d{1,2})$/, '$1-$2');
    } else {
      val = val.replace(/^(\d{2})(\d)/, '$1.$2');
      val = val.replace(/^(\d{2})\.(\d{3})(\d)/, '$1.$2.$3');
      val = val.replace(/\.(\d{3})(\d)/, '.$1/$2');
      val = val.replace(/(\d{4})(\d)/, '$1-$2');
    }
    e.target.value = val;
  });
}

function initPaymentTabs() {
  document.getElementById('payment-tabs').addEventListener('click', (e) => {
    const tab = e.target.closest('.payment-tab');
    if (!tab) return;

    document.querySelectorAll('#payment-tabs .payment-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    selectedPaymentMethod = tab.dataset.method;

    document.querySelectorAll('.payment-panel').forEach(p => p.classList.remove('active'));
    document.getElementById('panel-' + tab.dataset.method).classList.add('active');
  });
}

// ========================================

    document.getElementById('paypal-button-container').innerHTML =
      '<p style="color:#999;text-align:center;padding:1rem;">' + (t('checkout.payment_loading') || 'Payment SDK loading...') + ' ' + (t('checkout.payment_refresh') || 'Please refresh if this persists.') + '</p>';

  paypal_sdk.Buttons({
    style: {
      layout: 'vertical',
      color: 'blue',
      shape: 'rect',
      label: 'paypal'
    },
    createOrder: function(data, actions) {
      return actions.order.create({
        purchase_units: [{
          amount: { value: currentTotal.toFixed(2), currency_code: currentCurrency },
          description: (t('checkout.paypal_order_desc') || 'F&J Beauty Order')
        }]
      });
    },
    onApprove: function(data, actions) {

// ========================================
// Stripe Integration
// ========================================
function initStripe() {
  if (typeof Stripe === 'undefined') {
    document.getElementById('stripe-card-element').innerHTML =
      '<p style="color:#999;">' + (t('checkout.payment_loading') || 'Stripe loading...') + ' ' + (t('checkout.payment_refresh') || 'Please refresh.') + '</p>';
    return;
  }

  // Stripe key from site config (fallback to test key)
  var stripeKey = (window.FJ_CONFIG && window.FJ_CONFIG.payments && window.FJ_CONFIG.payments.stripePublishableKey) || 'pk_test_demo_fjbeauty_2026';
  stripe = Stripe(stripeKey);

  const elements = stripe.elements();
  stripeCard = elements.create('card', {
    style: {
      base: {
        fontSize: '16px',
        fontFamily: 'Inter, -apple-system, sans-serif',
        color: '#333',
        '::placeholder': { color: '#aaa' }
      }
    }
  });
  stripeCard.mount('#stripe-card-element');
  stripeCard.on('change', function(event) {
    const displayError = document.getElementById('card-errors');
    displayError.textContent = event.error ? event.error.message : '';
  });
}

async function payWithStripe() {
  const btn = document.getElementById('stripe-pay-btn');
  btn.disabled = true;
  btn.textContent = t('checkout.processing') || 'Processing...';

  try {
    // Step 1: Create PaymentIntent on the server
    let clientSecret = null;
    let demoMode = false;

    try {
      const response = await fetch('/api/orders/create-payment-intent', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ amount: currentTotal, currency: currentCurrency })
      });
      const piData = await response.json();
      if (piData.clientSecret) {
        clientSecret = piData.clientSecret;
        demoMode = !!piData.demoMode;
      }
    } catch (e) {
      // Backend unavailable, fall back to demo mode
      demoMode = true;
    }

    if (demoMode || !clientSecret || clientSecret.startsWith('pi_demo_')) {
      // Demo mode: simulate payment without real Stripe backend
      const { paymentMethod, error } = await stripe.createPaymentMethod({
        type: 'card',
        card: stripeCard
      });

      if (error) {
        throw new Error(error.message);
      }

      // Simulate confirmed payment
      processOrder('stripe', 'pi_demo_' + Date.now());
      return;
    }

    // Step 2: Confirm card payment with the client secret
    const { paymentIntent, error } = await stripe.confirmCardPayment(clientSecret, {
      payment_method: {
        card: stripeCard,
        billing_details: {
          name: document.getElementById('fullname').value.trim(),
          email: document.getElementById('email').value.trim(),
        }
      }
    });

    if (error) {
      throw new Error(error.message);
    }

    if (paymentIntent.status === 'succeeded') {
      // Payment confirmed by Stripe, process the order
      processOrder('stripe', paymentIntent.id);
    } else {
      throw new Error('Payment was not completed. Status: ' + paymentIntent.status);
    }
  } catch (err) {
    showToast((t('checkout.payment_failed') || 'Payment failed: ') + err.message, true);
    btn.disabled = false;
    btn.textContent = `\u{1F4B3} ${t('checkout.pay_amount') || 'Pay'} ${formatPrice(currentTotal)}`;
  }
}

// ========================================
// Order Processing
// ========================================
async function processOrder(paymentMethod, paymentId) {
  // Validate
  const fullname = document.getElementById('fullname').value.trim();
  const email = document.getElementById('email').value.trim();
  const address = document.getElementById('address').value.trim();
  const city = document.getElementById('city').value.trim();
  const country = document.getElementById('country').value;

  if (!fullname || !email || !address || !city || !country) {
    showToast(t('checkout.fill_required') || 'Please fill in all required shipping fields.', true);
    return;
  }

  if (country === 'BR') {
    const cpf = document.getElementById('cpf').value.replace(/\D/g, '');
    if (!cpf || cpf.length < 11) {
      showToast(t('checkout.cpf_required') || 'CPF/CNPJ is required for Brazil deliveries.', true);
      return;
    }
  }

  // Build order items
  const cart = getCart();
  const items = cart.map(item => {
    const product = getProduct(item.productId);
    const brand = getBrand(product ? product.brand : '');
    return {
      product_id: item.productId,
      product_name: product ? product.name : 'Product',
      brand_name: brand ? brand.name : '',
      price: product ? product.price : 0,
      quantity: item.qty
    };
  });

  const subtotal = cartTotal();
  const orderData = {
    items,
    subtotal,
    total: currentTotal,
    currency: currentCurrency,
    payment_method: paymentMethod,
    payment_id: paymentId || null,
    shipping_name: fullname,
    shipping_email: email,
    shipping_phone: document.getElementById('phone').value.trim(),
    shipping_address: address,
    shipping_city: city,
    shipping_state: document.getElementById('state').value.trim(),
    shipping_zip: document.getElementById('zip').value.trim(),
    shipping_country: country
  };

  try {
    const result = await Auth.createOrder(orderData);

    // Analytics: track purchase
    if (window.FJAnalytics) {
      FJAnalytics.purchase({ order_number: result.order.order_number, total: currentTotal, currency: currentCurrency, items: items });
    }

    // Show visual confirmation screen
    const orderNum = result.order.order_number;
    showConfirmation(orderNum, currentTotal, currentCurrency || 'USD', items);
  } catch (err) {
    // If API unavailable (demo mode), simulate success
    if (err.message.includes('Failed to fetch') || err.message.includes('NetworkError')) {

      // Analytics: track purchase (demo)
      if (window.FJAnalytics) {
        FJAnalytics.purchase({ order_number: 'DEMO-' + Date.now(), total: currentTotal, currency: currentCurrency, items: items });
      }

      // Show visual confirmation screen (demo)
      showConfirmation('DEMO-' + Date.now(), currentTotal, currentCurrency || 'USD', items, true);
    } else {
      showToast((t('checkout.order_failed') || 'Order failed: ') + err.message, true);
    }
  }
}

function showConfirmation(orderNumber, total, currency, items, isDemo) {
  const cc = document.getElementById('checkout-content');
  if (!cc) return;
  const redirectUrl = isDemo ? 'index.html' : 'account.html';
  cc.innerHTML = `
    <div class="order-confirm-screen">
      <div class="confirm-icon">🎉</div>
      <h2>${t('checkout.order_done_title') || 'Order Confirmed!'}</h2>
      <p style="color:#666;margin-bottom:1rem;">${t('checkout.order_done_sub') || 'Thank you for your order.'}</p>
      <div class="confirm-order-no">${t('checkout.order_no') || 'Order #'}${orderNumber}</div>
      <div class="confirm-total">${formatPrice(total)} <span style="font-size:0.9rem;color:#999;font-weight:500;">${currency}</span></div>
      <div class="confirm-countdown" id="confirm-countdown">3 <span data-i18n="checkout.countdown_redirect">${t('checkout.countdown_redirect') || 'seconds to redirect...'}</span></div>
      <div style="display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;">
        <a href="${redirectUrl}" class="btn btn-primary">${t('checkout.view_order') || 'View Order'}</a>
        <a href="shop.html" class="btn btn-outline">${t('checkout.continue_shop') || 'Continue Shopping'}</a>
      </div>
    </div>
  `;
  clearCart();
  let sec = 3;
  const cdEl = document.getElementById('confirm-countdown');
  const iv = setInterval(() => {
    sec--;
    if (cdEl) cdEl.innerHTML = sec + ' <span data-i18n="checkout.countdown_redirect">' + (t('checkout.countdown_redirect') || 'seconds to redirect...') + '</span>';
    if (sec <= 0) { clearInterval(iv); window.location.href = redirectUrl; }
  }, 1000);
}

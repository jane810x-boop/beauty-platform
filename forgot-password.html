<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Reset Password — F&amp;J</title>
<meta name="description" content="Reset your F&J Beauty account password">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css?v=3">
<script src="js/layout.js?v=2"></script>
<script src="js/i18n.js"></script>
<style>
  .auth-page { min-height: 70vh; display: flex; align-items: center; justify-content: center; padding: 3rem 1rem; }
  .auth-card { background: #fff; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.06); padding: 2.5rem; max-width: 420px; width: 100%; }
  .auth-card h1 { font-size: 1.6rem; margin-bottom: 0.5rem; text-align: center; }
  .auth-card .subtitle { color: #777; font-size: 0.9rem; text-align: center; margin-bottom: 2rem; }
  .auth-card .form-group { margin-bottom: 1.25rem; }
  .auth-card label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 0.35rem; }
  .auth-card input { width: 100%; padding: 0.75rem 1rem; border: 1.5px solid #e0e0e0; border-radius: 8px; font-size: 0.95rem; font-family: inherit; box-sizing: border-box; transition: border-color 0.2s; }
  .auth-card input:focus { outline: none; border-color: #E5342B; }
  .auth-card .btn { width: 100%; padding: 0.875rem; font-size: 1rem; }
  .auth-card .alert { padding: 0.75rem 1rem; border-radius: 8px; font-size: 0.85rem; margin-bottom: 1rem; }
  .auth-card .alert.success { background: #E8F5E9; color: #2e7d32; }
  .auth-card .alert.error { background: #FFEBEE; color: #c62828; }
  .auth-card .back-link { text-align: center; margin-top: 1.5rem; font-size: 0.85rem; }
  .auth-card .back-link a { color: #E5342B; text-decoration: none; font-weight: 600; }
  .password-hint { font-size: 0.75rem; color: #999; margin-top: 0.25rem; }
</style>
</head>
<body>

<div id="header-mount" data-minimal="true"></div>

<section class="auth-page">
  <div class="auth-card">
    <h1 id="page-title">Reset Password</h1>
    <p class="subtitle" id="page-subtitle">Enter your email to receive a reset link</p>

    <div id="alert-box"></div>

    <!-- Request reset form -->
    <div id="request-form">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="you@example.com">
      </div>
      <button class="btn btn-primary" id="submit-btn" onclick="requestReset()">Send Reset Link</button>
    </div>

    <!-- Reset password form (shown when token is present) -->
    <div id="reset-form" style="display:none;">
      <div class="form-group">
        <label>New Password</label>
        <input type="password" id="new-password" placeholder="Enter new password">
        <div class="password-hint">Minimum 6 characters</div>
      </div>
      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" id="confirm-password" placeholder="Confirm new password">
      </div>
      <button class="btn btn-primary" id="reset-btn" onclick="resetPassword()">Reset Password</button>
    </div>

    <div class="back-link">
      <a href="login.html">Back to Login</a>
    </div>
  </div>
</section>

<script src="js/site-config.js"></script>
<script>
(function() {
  var params = new URLSearchParams(window.location.search);
  var token = params.get('token');

  if (token) {
    // Show reset form
    document.getElementById('request-form').style.display = 'none';
    document.getElementById('reset-form').style.display = 'block';
    document.getElementById('page-title').textContent = 'Set New Password';
    document.getElementById('page-subtitle').textContent = 'Enter your new password below';
  }

  // Handle Enter key
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
      if (token) resetPassword();
      else requestReset();
    }
  });
})();

function showAlert(msg, type) {
  var box = document.getElementById('alert-box');
  box.innerHTML = '<div class="alert ' + type + '">' + escapeHtml(msg) + '</div>';
}

function escapeHtml(str) {
  var div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

async function requestReset() {
  var email = document.getElementById('email').value.trim();
  if (!email) {
    showAlert('Please enter your email address.', 'error');
    return;
  }

  var btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.textContent = 'Sending...';

  try {
    var response = await fetch('/api/auth/forgot-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: email })
    });
    var data = await response.json();

    showAlert(data.message || 'If an account exists, a reset link has been sent.', 'success');
    document.getElementById('email').value = '';
  } catch (err) {
    // Backend unavailable - show generic success for security
    showAlert('If an account exists, a reset link has been sent.', 'success');
  }

  btn.disabled = false;
  btn.textContent = 'Send Reset Link';
}

async function resetPassword() {
  var params = new URLSearchParams(window.location.search);
  var token = params.get('token');
  var password = document.getElementById('new-password').value;
  var confirm = document.getElementById('confirm-password').value;

  if (!password || password.length < 6) {
    showAlert('Password must be at least 6 characters.', 'error');
    return;
  }
  if (password !== confirm) {
    showAlert('Passwords do not match.', 'error');
    return;
  }

  var btn = document.getElementById('reset-btn');
  btn.disabled = true;
  btn.textContent = 'Resetting...';

  try {
    var response = await fetch('/api/auth/reset-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token: token, password: password })
    });
    var data = await response.json();

    if (response.ok) {
      showAlert(data.message || 'Password reset successfully!', 'success');
      setTimeout(function() { window.location.href = 'login.html'; }, 2000);
    } else {
      showAlert(data.error || 'Failed to reset password.', 'error');
      btn.disabled = false;
      btn.textContent = 'Reset Password';
    }
  } catch (err) {
    showAlert('Unable to connect to server. Please try again later.', 'error');
    btn.disabled = false;
    btn.textContent = 'Reset Password';
  }
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Shop All Products — F&amp;J</title>
<meta name="description" content="Browse our full collection of authentic Asian beauty products. Filter by category, brand, and more.">
<link rel="canonical" href="https://fjbeauty.com/shop.html">
<meta property="og:title" content="Shop All — F&amp;J K-Beauty">
<meta property="og:description" content="Browse our full collection of authentic Korean skincare, cosmetics, and Asian beauty products.">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css?v=4">
  <script src="js/layout.js?v=2"></script>
<script src="js/i18n.js"></script>
</head>
<body>

<!-- Header -->
<div id="header-mount" data-nav="shop"></div>

<!-- Breadcrumb -->
<div class="container">
  <div class="breadcrumb">
    <a href="index.html" data-i18n="nav.home" data-i18n-en="Home">首頁</a> <span>/</span> <span id="breadcrumb-cat" data-i18n="shop.title" data-i18n-en="All Products">全部商品</span>
  </div>
</div>

<!-- Shop Layout -->
<section class="section" style="padding-top:1rem">
  <div class="container">
    <div class="shop-layout">
      <!-- Sidebar Filters -->
      <aside class="filter-sidebar" id="filter-sidebar">
        <!-- Category Filter -->
        <div class="filter-group">
          <h4 data-i18n="shop.filter_category" data-i18n-en="Category">分類</h4>
          <label class="filter-option">
            <input type="radio" name="category" value="all" checked onchange="applyFilters()"> <span data-i18n="shop.all_cat" data-i18n-en="All Categories">全部分類</span>
          </label>
          <label class="filter-option">
            <input type="radio" name="category" value="cleansers" onchange="applyFilters()"> 🧼 <span data-i18n="cat.cleansers" data-i18n-en="Cleansers">潔面</span>
          </label>
          <label class="filter-option">
            <input type="radio" name="category" value="toners" onchange="applyFilters()"> 💦 <span data-i18n="cat.toners" data-i18n-en="Toners & Mists">爽膚水</span>
          </label>
          <label class="filter-option">
            <input type="radio" name="category" value="serums" onchange="applyFilters()"> 💉 <span data-i18n="cat.serums" data-i18n-en="Serums & Ampoules">精華</span>
          </label>
          <label class="filter-option">
            <input type="radio" name="category" value="moisturizers" onchange="applyFilters()"> 🧴 <span data-i18n="cat.moisturizers" data-i18n-en="Moisturizers">面霜</span>
          </label>
          <label class="filter-option">
            <input type="radio" name="category" value="sunscreen" onchange="applyFilters()"> ☀️ <span data-i18n="cat.sunscreen" data-i18n-en="Sunscreen">防曬</span>
          </label>
          <label class="filter-option">
            <input type="radio" name="category" value="masks" onchange="applyFilters()"> 😷 <span data-i18n="cat.masks" data-i18n-en="Sheet Masks">面膜</span>
          </label>
          <label class="filter-option">
            <input type="radio" name="category" value="makeup" onchange="applyFilters()"> 💄 <span data-i18n="cat.makeup" data-i18n-en="Makeup">彩妝</span>
          </label>
          <label class="filter-option">
            <input type="radio" name="category" value="body" onchange="applyFilters()"> 🤲 <span data-i18n="cat.body" data-i18n-en="Body Care">身體護理</span>
          </label>
        </div>

        <!-- Brand Filter -->
        <div class="filter-group">
          <h4 data-i18n="shop.filter_brand" data-i18n-en="Brand">品牌</h4>
          <label class="filter-option">
            <input type="radio" name="brand" value="all" checked onchange="applyFilters()"> <span data-i18n="shop.all_brands" data-i18n-en="All Brands">全部品牌</span>
          </label>
          <div id="brand-filters"></div>
        </div>

        <!-- Price Filter -->
        <div class="filter-group">
          <h4 data-i18n="shop.filter_price" data-i18n-en="Price Range">價格區間</h4>
          <label class="filter-option">
            <input type="radio" name="price" value="all" checked onchange="applyFilters()"> <span data-i18n="shop.price_all" data-i18n-en="All Prices">全部價格</span>
          </label>
          <label class="filter-option">
            <input type="radio" name="price" value="0-25" onchange="applyFilters()"> <span data-i18n="shop.price_under25" data-i18n-en="Under $25">$25 以下</span>
          </label>
          <label class="filter-option">
            <input type="radio" name="price" value="25-50" onchange="applyFilters()"> <span data-i18n="shop.price_25_50" data-i18n-en="$25 — $50">$25 — $50</span>
          </label>
          <label class="filter-option">
            <input type="radio" name="price" value="50-100" onchange="applyFilters()"> <span data-i18n="shop.price_50_100" data-i18n-en="$50 — $100">$50 — $100</span>
          </label>
          <label class="filter-option">
            <input type="radio" name="price" value="100" onchange="applyFilters()"> <span data-i18n="shop.price_100plus" data-i18n-en="$100+">$100 以上</span>
          </label>
        </div>
        <button class="btn btn-outline btn-sm btn-block" onclick="resetFilters()" data-i18n="shop.clear_filters" data-i18n-en="Clear Filters">清除篩選</button>
      </aside>

      <!-- Products -->
      <main>
        <div class="shop-header">
          <div>
            <span id="result-count" style="color:var(--text-muted);font-size:0.9rem;"></span>
            <button class="btn btn-sm btn-outline" id="mobile-filter-toggle" style="display:none;margin-left:0.5rem;" data-i18n="shop.filter" data-i18n-en="☰ Filters">☰ 篩選</button>
          </div>
          <select class="sort-select" onchange="applyFilters()" id="sort-select">
            <option value="featured" data-i18n="shop.sort_default" data-i18n-en="Featured">默認</option>
            <option value="bestselling" data-i18n="shop.sort_bestselling" data-i18n-en="Best Selling">最暢銷</option>
            <option value="price-low" data-i18n="shop.sort_price_asc" data-i18n-en="Price: Low to High">價格從低到高</option>
            <option value="price-high" data-i18n="shop.sort_price_desc" data-i18n-en="Price: High to Low">價格從高到低</option>
            <option value="newest" data-i18n="shop.sort_newest" data-i18n-en="Newest">最新</option>
            <option value="rating" data-i18n="shop.sort_rating" data-i18n-en="Top Rated">評分最高</option>
          </select>
        </div>
        <div class="product-grid" id="shop-grid"></div>
        <div id="no-results" style="display:none;text-align:center;padding:4rem 2rem;">
          <div style="font-size:4rem;margin-bottom:1rem;">🔍</div>
          <h3 data-i18n="shop.no_results" data-i18n-en="No products found">沒有找到匹配的商品</h3>
          <p style="color:var(--text-light);margin-bottom:1.5rem;" data-i18n="shop.no_results_text" data-i18n-en="Try adjusting your filters or search criteria.">請嘗試調整篩選條件或搜索關鍵詞。</p>
          <button class="btn btn-outline" onclick="resetFilters()" data-i18n="shop.clear_filters" data-i18n-en="Clear All Filters">清除篩選</button>
        </div>
        <div id="pagination" class="pagination-container"></div>
      </main>
    </div>
  </div>
</section>

<!-- Footer -->
<div id="footer-mount"></div>

<script src="js/products.js"></script>
<script src="js/api.js"></script>
<script src="js/cart.js"></script>
<script src="js/wishlist.js"></script>
<script src="js/analytics.js"></script>
<script src="js/main.js"></script>
<script src="js/site-config.js"></script>
<script src="js/whatsapp.js"></script>
<script src="js/age-verify.js"></script>
<script src="js/lgpd-cookie.js"></script>
<script>
// Generate brand filter checkboxes
(function() {
  const container = document.getElementById('brand-filters');
  BRANDS.forEach(b => {
    const label = document.createElement('label');
    label.className = 'filter-option';
    label.innerHTML = `<input type="radio" name="brand" value="${b.id}" onchange="applyFilters()"> ${b.emoji} ${b.name}`;
    container.appendChild(label);
  });
})();

// Pagination state
let currentPage = 1;
const ITEMS_PER_PAGE = 12;

// Read URL params
function getParams() {
  const params = new URLSearchParams(window.location.search);
  return {
    cat: params.get('cat') || 'all',
    brand: params.get('brand') || 'all',
    sort: params.get('sort') || 'featured',
    search: params.get('search') || ''
  };
}

// Apply URL params to filter inputs, then load products async
(function() {
  const p = getParams();
  if (p.cat !== 'all') {
    const radio = document.querySelector(`input[name="category"][value="${p.cat}"]`);
    if (radio) radio.checked = true;
    const catName = CATEGORIES.find(c => c.id === p.cat)?.name || p.cat;
    document.getElementById('breadcrumb-cat').textContent = catName;
  }
  if (p.brand !== 'all') {
    const radio = document.querySelector(`input[name="brand"][value="${p.brand}"]`);
    if (radio) radio.checked = true;
    const brandName = BRANDS.find(c => c.id === p.brand)?.name || p.brand;
    document.getElementById('breadcrumb-cat').textContent = brandName;
  }
  if (p.sort) {
    document.getElementById('sort-select').value = p.sort;
  }
  if (p.search) {
    document.getElementById('header-search').value = p.search;
    document.getElementById('breadcrumb-cat').textContent = t('shop.search_label') + ': "' + p.search + '"';
  }

  // 異步加載產品數據，然後渲染
  loadAndRender();
})();

async function loadAndRender() {
  // 優先從API加載，降級到靜態數據
  if (typeof ProductAPI !== 'undefined') {
    allProducts = await ProductAPI.getAllProducts();
  } else {
    allProducts = PRODUCTS;
  }
  applyFilters();
}

async function applyFilters(page) {
  if (page) currentPage = page;
  else currentPage = 1;

  // Read all filter values
  const catEls = document.getElementsByName('category');
  const brandEls = document.getElementsByName('brand');
  const priceEls = document.getElementsByName('price');
  const sort = document.getElementById('sort-select').value;

  let cat = 'all', brand = 'all', price = 'all';
  for (const el of catEls) if (el.checked) cat = el.value;
  for (const el of brandEls) if (el.checked) brand = el.value;
  for (const el of priceEls) if (el.checked) price = el.value;

  // 用動態數據源（API優先）
  let source = allProducts || PRODUCTS;
  let filtered = [...source];
  if (cat !== 'all') filtered = filtered.filter(p => p.category === cat);
  if (brand !== 'all') filtered = filtered.filter(p => p.brand === brand);
  if (price !== 'all') {
    if (price === '0-25') filtered = filtered.filter(p => p.price <= 25);
    else if (price === '25-50') filtered = filtered.filter(p => p.price > 25 && p.price <= 50);
    else if (price === '50-100') filtered = filtered.filter(p => p.price > 50 && p.price <= 100);
    else if (price === '100') filtered = filtered.filter(p => p.price > 100);
  }

  // Search filter
  const searchQuery = getParams().search;
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    filtered = filtered.filter(p => {
      const brandObj = getBrand(p.brand);
      return p.name.toLowerCase().includes(q) ||
             (p.nameZh && p.nameZh.includes(q)) ||
             (brandObj && brandObj.name.toLowerCase().includes(q)) ||
             (p.desc && p.desc.toLowerCase().includes(q));
    });
  }

  // Sort
  if (sort === 'bestselling') filtered.sort((a, b) => b.reviews - a.reviews);
  else if (sort === 'price-low') filtered.sort((a, b) => a.price - b.price);
  else if (sort === 'price-high') filtered.sort((a, b) => b.price - a.price);
  else if (sort === 'newest') filtered.sort((a, b) => {
    if (a._source === 'api' && b._source !== 'api') return -1;
    if (b._source === 'api' && a._source !== 'api') return 1;
    return 0;
  });
  else if (sort === 'rating') filtered.sort((a, b) => b.rating - a.rating);

  // Store globally for language/currency switching
  window.currentFilteredProducts = filtered;

  // Pagination
  const total = filtered.length;
  const totalPages = Math.ceil(total / ITEMS_PER_PAGE);
  const offset = (currentPage - 1) * ITEMS_PER_PAGE;
  const pageItems = filtered.slice(offset, offset + ITEMS_PER_PAGE);

  // Render
  const grid = document.getElementById('shop-grid');
  const noResults = document.getElementById('no-results');
  const count = document.getElementById('result-count');

  if (total === 0) {
    grid.innerHTML = '';
    noResults.style.display = 'block';
    count.textContent = t('shop.products_count').replace('{count}', '0');
    document.getElementById('pagination').innerHTML = '';
  } else {
    noResults.style.display = 'none';
    grid.innerHTML = pageItems.map(p => renderProductCard(p)).join('');
    count.textContent = t('shop.products_count').replace('{count}', total);
    if (typeof updateWishlistUI === 'function') updateWishlistUI();

    // Render pagination
    renderPagination(
      document.getElementById('pagination'),
      currentPage,
      totalPages,
      'applyFilters'
    );
  }

  // Update mobile filter visibility
  const mft = document.getElementById('mobile-filter-toggle');
  mft.style.display = window.innerWidth <= 768 ? 'inline-flex' : 'none';

  updateCartUI();
}

function resetFilters() {
  document.querySelectorAll('input[name="category"]').forEach(el => el.checked = el.value === 'all');
  document.querySelectorAll('input[name="brand"]').forEach(el => el.checked = el.value === 'all');
  document.querySelectorAll('input[name="price"]').forEach(el => el.checked = el.value === 'all');
  document.getElementById('sort-select').value = 'featured';
  document.getElementById('breadcrumb-cat').textContent = t('shop.all_products');
  // Clear search param
  if (window.location.search.includes('search=')) {
    window.history.replaceState({}, '', 'shop.html');
  }
  applyFilters();
}

// Mobile filter toggle
document.getElementById('mobile-filter-toggle').addEventListener('click', () => {
  const sidebar = document.getElementById('filter-sidebar');
  // Create backdrop if not exists
  let backdrop = document.querySelector('.filter-backdrop');
  if (!backdrop) {
    backdrop = document.createElement('div');
    backdrop.className = 'filter-backdrop';
    backdrop.onclick = () => {
      sidebar.classList.remove('open');
      backdrop.classList.remove('open');
    };
    document.body.appendChild(backdrop);
  }
  sidebar.classList.toggle('open');
  backdrop.classList.toggle('open');
});

window.addEventListener('resize', () => {
  document.getElementById('mobile-filter-toggle').style.display = window.innerWidth <= 768 ? 'inline-flex' : 'none';
});
</script>
  <script src="js/auth.js"></script>
</body>
</html>

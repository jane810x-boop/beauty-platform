<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title data-i18n-en="F&amp;J — Learn">F&amp;J — 美妝學堂</title>
<meta name="description" content="Skincare reviews, ingredient deep dives, and routines &amp; tips. Learn K-beauty inside out with F&amp;J.">
<meta property="og:title" content="F&amp;J — Learn">
<meta property="og:description" content="Skincare reviews, ingredient deep dives, and routines &amp; tips.">
<meta property="og:url" content="https://fjbeauty.com/blog.html">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<link rel="canonical" href="https://fjbeauty.com/blog.html">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,400;1,500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css?v=4">
<link rel="stylesheet" href="css/blog.css?v=4">
<script src="js/layout.js?v=2"></script>
<script src="js/i18n.js"></script>
<script src="js/blog-data.js"></script>
</head>
<body>

<div id="header-mount" data-nav=""></div>

<section class="blog-header">
  <div class="container">
    <h1 data-i18n="learn.title" data-i18n-en="Learn">美妝學堂</h1>
    <p data-i18n="learn.subtitle" data-i18n-en="Reviews, ingredient deep dives, and skincare routines">產品測評、成分科普與護膚步驟全攻略</p>
  </div>
</section>

<section class="blog-featured" id="blog-featured"></section>

<div class="container">
  <div class="blog-search">
    <input type="text" id="blog-search-input" data-i18n-placeholder="blog.search" placeholder="搜索文章..." oninput="renderBlog()">
  </div>
  <div class="cat-filter" id="cat-filter"></div>
</div>

<div class="container">
  <div class="blog-grid" id="blog-grid"></div>
</div>

<div class="container">
  <div class="blog-tags" id="blog-tags"></div>
</div>

<section class="blog-newsletter">
  <div class="container">
    <span class="newsletter-eyebrow">F&J · NEWSLETTER</span>
    <h2 data-i18n="blog.newsletter_title" data-i18n-en="Subscribe to the F&J Beauty Letter">訂閱 F&J 美妝通訊</h2>
    <p data-i18n="blog.newsletter_desc" data-i18n-en="Skincare tips, new arrivals, and exclusive offers — every week, in your inbox.">每周護膚技巧、新品速遞與獨家優惠，直接送達你的郵箱。</p>
    <form class="newsletter-form" id="blog-newsletter-form" onsubmit="return subscribeNewsletter(event,'blog-newsletter-email','blog-newsletter-msg')">
      <input type="email" id="blog-newsletter-email" data-i18n-placeholder="blog.newsletter_email" placeholder="輸入你的郵箱" required>
      <button type="submit" class="btn btn-primary" data-i18n="blog.subscribe" data-i18n-en="Subscribe">訂閱</button>
    </form>
    <p class="newsletter-msg" id="blog-newsletter-msg" role="status"></p>
  </div>
</section>

<div id="footer-mount"></div>

<script>
/* ===== i18n helpers ===== */
window.__blogLangCallback = function() {
  renderBlog();
};

/* ===== Blog Render ===== */
function getLang() { return window.currentLang || localStorage.getItem('fj-lang') || 'en'; }

function tKey(key, lang) {
  if (window.i18nData && window.i18nData[lang] && window.i18nData[lang][key]) {
    return window.i18nData[lang][key];
  }
  return key;
}

function reI18n() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    const val = tKey(key, getLang());
    if (val && val !== key) el.textContent = val;
  });
}

/* ===== Render Categories ===== */
function renderCategories(activeCat) {
  const lang = getLang();
  // Map new category slugs to blog-data keys
  const CATEGORY_SLUG_MAP = { 'reviews': 'blog.cat.reviews', 'ingredients': 'blog.cat.ingredients', 'routines': 'blog.cat.routines', 'all': 'blog.cat.all' };
  const cats = [['all', 'blog.cat.all'], ['reviews', 'blog.cat.reviews'], ['ingredients', 'blog.cat.ingredients'], ['routines', 'blog.cat.routines']];
  document.getElementById('cat-filter').innerHTML = cats.map(([slug, key]) =>
    `<button class="cat-btn${activeCat === slug ? ' active' : ''}" onclick="setCategory('${slug}')">${tKey(key, lang)}</button>`
  ).join('');
}

/* ===== Render Articles ===== */
function getFeaturedArticle() {
  return blogArticles.slice().sort((a, b) => new Date(b.date) - new Date(a.date))[0];
}

function renderBlog() {
  const lang = getLang();
  const params = new URLSearchParams(location.search);
  const cat = params.get('cat') || 'all';
  const input = document.getElementById('blog-search-input');
  const searchTerm = (input && input.value) ? input.value : (params.get('search') || '');
  const search = searchTerm.toLowerCase().trim();

  // Map new URL slugs to article data categories
  const CAT_MAP = { 'reviews': 'k-beauty-101', 'ingredients': 'guia-de-ingredientes', 'routines': 'rotinas' };

  renderCategories(cat);

  let articles = blogArticles;
  if (cat !== 'all') {
    const mappedCat = CAT_MAP[cat] || cat;
    articles = articles.filter(a => a.category === mappedCat);
  }
  if (search) {
    articles = articles.filter(a => {
      const c = a.content[lang] || a.content['en'] || a.content['pt-BR'] || a.content['zhHK'];
      return (c.title || '').toLowerCase().includes(search) ||
             (c.excerpt || '').toLowerCase().includes(search) ||
             (a.tags[lang] || a.tags['en'] || a.tags['pt-BR'] || []).some(t => t.toLowerCase().includes(search));
    });
  }

  // Featured (only on unfiltered, non-searched view)
  const showFeatured = (cat === 'all' && !search);
  renderFeatured(showFeatured, lang);
  renderTagCloud(lang);

  let gridArticles = articles;
  if (showFeatured) {
    const featured = getFeaturedArticle();
    gridArticles = articles.filter(a => a.slug !== featured.slug);
  }

  const grid = document.getElementById('blog-grid');
  if (!gridArticles.length) {
    grid.innerHTML = `<div class="blog-empty"><h3>${tKey('blog.no_results', lang)}</h3><p>${tKey('blog.no_results_desc', lang)}</p></div>`;
    return;
  }

  grid.innerHTML = gridArticles.map(a => {
    const c = a.content[lang] || a.content['en'] || a.content['pt-BR'] || a.content['zhHK'];
    const catInfo = BLOG_CATEGORIES[a.category];
    const catName = catInfo && (catInfo[lang] || catInfo['en'] || catInfo['pt-BR'] || catInfo['zhHK']).name;
    const waterDrop = a.waterDrop ? '<div class="water-drop" style="bottom:20px;right:20px;"></div>' : '';
    return `
      <article class="article-card" onclick="location.href='article.html?slug=${a.slug}'">
        <div class="article-card-cover" style="background:${a.coverGradient}">
          <span class="cover-icon">${(catInfo && catInfo.coverIcon) || 'K'}</span>
          ${waterDrop}
        </div>
        <div class="article-card-body">
          <span class="article-card-cat">${catName || a.category}</span>
          <h3 class="article-card-title">${c.title}</h3>
          <p class="article-card-excerpt">${c.excerpt}</p>
          <div class="article-card-meta">
            <span>${new Date(a.date).toLocaleDateString(lang === 'zhHK' ? 'zh-HK' : lang === 'pt-BR' ? 'pt-BR' : 'en-US', {year:'numeric',month:'short',day:'numeric'})}</span>
            <span>${t('blog.min_read').replace('{min}', a.readTime)}</span>
          </div>
        </div>
      </article>`;
  }).join('');

  reI18n();
}

/* ===== Featured (Editor's Pick) ===== */
function renderFeatured(show, lang) {
  const el = document.getElementById('blog-featured');
  if (!el) return;
  if (!show) { el.style.display = 'none'; el.innerHTML = ''; return; }
  const featured = getFeaturedArticle();
  if (!featured) { el.style.display = 'none'; return; }
  const c = featured.content[lang] || featured.content['en'] || featured.content['pt-BR'] || featured.content['zhHK'];
  const catInfo = BLOG_CATEGORIES[featured.category];
  const catName = catInfo ? (catInfo[lang] || catInfo['en'] || catInfo['pt-BR'] || catInfo['zhHK']).name : featured.category;
  el.style.display = '';
  el.innerHTML = `
    <div class="container">
      <div class="featured-card" onclick="location.href='article.html?slug=${featured.slug}'">
        <div class="featured-cover" style="background:${featured.coverGradient}">
          <span class="cover-icon">${(catInfo && catInfo.coverIcon) || 'K'}</span>
          ${featured.waterDrop ? '<div class="water-drop" style="bottom:24px;right:24px;"></div>' : ''}
        </div>
        <div class="featured-body">
          <span class="featured-badge">★ ${tKey('blog.featured', lang)}</span>
          <span class="article-card-cat">${catName}</span>
          <h2 class="featured-title">${c.title}</h2>
          <p class="featured-excerpt">${c.excerpt}</p>
          <div class="article-card-meta">
            <span>${new Date(featured.date).toLocaleDateString(lang === 'zhHK' ? 'zh-HK' : lang === 'pt-BR' ? 'pt-BR' : 'en-US', {year:'numeric',month:'short',day:'numeric'})}</span>
            <span>${t('blog.min_read').replace('{min}', featured.readTime)}</span>
          </div>
          <a href="article.html?slug=${featured.slug}" class="btn btn-outline featured-link" data-i18n="blog.read_more" data-i18n-en="Read article →">閱讀全文 →</a>
        </div>
      </div>
    </div>`;
}

/* ===== Tag Cloud ===== */
function renderTagCloud(lang) {
  const el = document.getElementById('blog-tags');
  if (!el) return;
  const counts = {};
  blogArticles.forEach(a => {
    const tags = a.tags[lang] || a.tags['en'] || a.tags['pt-BR'] || [];
    tags.forEach(t => { counts[t] = (counts[t] || 0) + 1; });
  });
  const top = Object.entries(counts).sort((x, y) => y[1] - x[1]).slice(0, 14);
  el.innerHTML = `<span class="tag-cloud-label"># ${tKey('blog.tag_cloud', lang)}</span> ` +
    top.map(([t]) => `<a href="blog.html?search=${encodeURIComponent(t)}" class="tag-cloud-item">${t}</a>`).join('');
}

/* ===== Newsletter ===== */
function subscribeNewsletter(e, inputId, msgId) {
  e.preventDefault();
  const lang = getLang();
  const input = document.getElementById(inputId);
  const msg = document.getElementById(msgId);
  const val = (input.value || '').trim();
  const ok = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(val);
  if (!ok) { msg.textContent = tKey('blog.newsletter_error', lang); msg.className = 'newsletter-msg error'; return false; }
  msg.textContent = tKey('blog.newsletter_success', lang); msg.className = 'newsletter-msg success';
  input.value = '';
  return false;
}

function setCategory(cat) {
  const url = new URL(location);
  if (cat === 'all') { url.searchParams.delete('cat'); }
  else { url.searchParams.set('cat', cat); }
  history.pushState(null, '', url);
  renderBlog();
}

/* ===== Init ===== */
document.addEventListener('DOMContentLoaded', function() {
  if (typeof i18nInit === 'function') {
    const origInit = i18nInit;
    i18nInit = function() {
      origInit();
      renderBlog();
    };
  }
  setTimeout(function() {
    if (typeof blogArticles !== 'undefined') renderBlog();
  }, 200);
  updateCartCount();
});

function updateCartCount() {
  try {
    const cart = JSON.parse(localStorage.getItem('fj_cart') || '[]');
    document.getElementById('cart-count').textContent = cart.reduce((s,i) => s + i.qty, 0);
  } catch(e) {}
}

/* Update header auth buttons */
try {
  const token = localStorage.getItem('fj_token');
  if (token) {
    document.getElementById('header-user-menu').style.display = '';
    document.getElementById('header-login-btn').style.display = 'none';
  }
} catch(e) {}
</script>
<script src="js/site-config.js"></script>
<script src="js/products.js"></script>
<script src="js/main.js"></script>
<script src="js/wishlist.js"></script>
<script src="js/analytics.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/cart.js"></script>
</body>
</html>

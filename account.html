<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>My Account — F&J</title>
  <meta name="description" content="View your order history and manage your F&J account.">
  <meta name="robots" content="noindex, follow">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css?v=3">
  <script src="js/layout.js?v=2"></script>
<script src="js/i18n.js"></script>
  <style>
    .account-page { max-width: 1000px; margin: 0 auto; padding: 3rem 2rem; }
    .account-page h1 { font-size: 2rem; font-weight: 700; margin-bottom: 2rem; }
    .account-tabs { display: flex; gap: 0; border-bottom: 2px solid #f0f0f0; margin-bottom: 2rem; }
    .account-tab { padding: 0.75rem 1.5rem; cursor: pointer; font-weight: 600; color: #999; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all 0.2s; background: none; border-top: none; border-left: none; border-right: none; font-size: 0.95rem; font-family: inherit; }
    .account-tab.active { color: #E5342B; border-bottom-color: #E5342B; }
    .account-tab:hover { color: #333; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    .profile-card { background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.04); padding: 2rem; max-width: 500px; }
    .profile-card .form-group { margin-bottom: 1.25rem; }
    .profile-card label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 0.4rem; color: #333; }
    .profile-card input, .profile-card select { width: 100%; padding: 0.75rem 1rem; border: 1.5px solid #e0e0e0; border-radius: 8px; font-size: 0.95rem; font-family: inherit; box-sizing: border-box; }
    .profile-card input:focus, .profile-card select:focus { outline: none; border-color: #E5342B; }

    .order-list { display: flex; flex-direction: column; gap: 1.5rem; }
    .order-card { background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.04); overflow: hidden; }
    .order-header { display: flex; justify-content: space-between; align-items: center; padding: 1.25rem 1.5rem; background: #fafafa; border-bottom: 1px solid #f0f0f0; }
    .order-number { font-weight: 600; color: #333; }
    .order-date { font-size: 0.85rem; color: #999; }
    .order-status { font-size: 0.8rem; font-weight: 600; padding: 0.25rem 0.75rem; border-radius: 20px; }
    .order-status.paid { background: #e8f5e9; color: #2e7d32; }
    .order-status.shipped { background: #e3f2fd; color: #1565c0; }
    .order-status.delivered { background: #f3e5f5; color: #7b1fa2; }
    .order-status.cancelled { background: #fbe9e7; color: #c62828; }
    .order-status.pending { background: #fff3e0; color: #e65100; }
    .order-items { padding: 1rem 1.5rem; }
    .order-item { display: flex; justify-content: space-between; align-items: center; padding: 0.75rem 0; border-bottom: 1px solid #f5f5f5; }
    .order-item:last-child { border-bottom: none; }
    .order-item-info { display: flex; align-items: center; gap: 1rem; }
    .order-item-img { width: 48px; height: 48px; border-radius: 8px; background: #f5f5f5; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; }
    .order-item-name { font-weight: 500; }
    .order-item-brand { font-size: 0.8rem; color: #999; }
    .order-item-price { font-weight: 600; }
    .order-footer { display: flex; justify-content: flex-end; padding: 1rem 1.5rem; border-top: 1px solid #f0f0f0; background: #fafafa; }
    .order-total { font-size: 1.1rem; font-weight: 700; }

    .empty-state { text-align: center; padding: 4rem 2rem; color: #999; }
    .empty-state .icon { font-size: 4rem; margin-bottom: 1rem; }
    .empty-state p { font-size: 1.1rem; margin-bottom: 1.5rem; }

    .logout-btn { color: #E5342B; font-weight: 600; cursor: pointer; background: none; border: none; font-size: 0.95rem; font-family: inherit; padding: 0; }
    .logout-btn:hover { text-decoration: underline; }
    .success-msg { background: #e8f5e9; color: #2e7d32; padding: 0.75rem 1rem; border-radius: 8px; font-size: 0.9rem; margin-bottom: 1rem; display: none; }
  </style>
</head>
<body>
  <div id="header-mount" data-nav=""></div>

  <main class="account-page">
    <h1 data-i18n="account.title">My Account</h1>

    <div class="account-tabs">
      <button class="account-tab active" data-tab="orders" data-i18n="account.tab.orders">Order History</button>
      <button class="account-tab" data-tab="profile" data-i18n="account.tab.profile">Profile Settings</button>
    </div>

    <!-- Orders Tab -->
    <div class="tab-content active" id="tab-orders">
      <div class="order-list" id="order-list">
        <div style="text-align:center;padding:3rem;color:#999;" data-i18n="account.loading">Loading orders...</div>
      </div>
    </div>

    <!-- Profile Tab -->
    <div class="tab-content" id="tab-profile">
      <div class="profile-card">
        <div class="success-msg" id="profile-success" data-i18n="account.success">Profile updated successfully!</div>
        <form id="profile-form">
          <div class="form-group">
            <label data-i18n="account.name">Name</label>
            <input type="text" id="prof-name" required>
          </div>
          <div class="form-group">
            <label data-i18n="account.email">Email</label>
            <input type="email" id="prof-email" disabled style="background:#f5f5f5;">
          </div>
          <div class="form-group">
            <label data-i18n="account.phone">Phone</label>
            <input type="text" id="prof-phone" placeholder="+1 234 567 8900">
          </div>
          <div class="form-group">
            <label data-i18n="account.country">Country</label>
            <select id="prof-country">
              <option value="US">United States</option>
              <option value="BR">Brazil</option>
              <option value="MX">Mexico</option>
              <option value="CA">Canada</option>
              <option value="GB">United Kingdom</option>
              <option value="DE">Germany</option>
              <option value="FR">France</option>
            </select>
          </div>
          <button type="submit" class="btn btn-primary" data-i18n="account.save">Save Changes</button>
        </form>
      </div>
    </div>
  </main>

  <div id="footer-mount"></div>

  <script src="js/site-config.js"></script>
  <script src="js/products.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/main.js"></script>
<script src="js/wishlist.js"></script>
<script src="js/analytics.js"></script>
<script src="js/whatsapp.js"></script>
  <script>
    // Redirect if not logged in
    if (!Auth.isLoggedIn()) {
      window.location.href = 'login.html';
    }

    // Tab switching
    document.querySelectorAll('.account-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.account-tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
      });
    });

    // Load profile
    async function loadProfile() {
      try {
        const data = await Auth.fetchProfile();
        document.getElementById('prof-name').value = data.user.name || '';
        document.getElementById('prof-email').value = data.user.email || '';
        document.getElementById('prof-phone').value = data.user.phone || '';
        document.getElementById('prof-country').value = data.user.country || 'US';
      } catch (err) {
        console.error('Load profile error:', err);
      }
    }

    // Profile form submit
    document.getElementById('profile-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      try {
        await Auth.updateProfile({
          name: document.getElementById('prof-name').value.trim(),
          phone: document.getElementById('prof-phone').value.trim(),
          country: document.getElementById('prof-country').value
        });
        document.getElementById('profile-success').style.display = 'block';
        setTimeout(() => {
          document.getElementById('profile-success').style.display = 'none';
        }, 3000);
      } catch (err) {
        alert('Update failed: ' + err.message);
      }
    });

    // Get translated status label
    function getStatusLabel(status) {
      const key = 'account.status.' + status;
      const translated = typeof t === 'function' ? t(key) : null;
      return translated || status;
    }

    // Load orders
    async function loadOrders() {
      const container = document.getElementById('order-list');
      try {
        const data = await Auth.getOrders();
        if (!data.orders || data.orders.length === 0) {
          container.innerHTML = `
            <div class="empty-state">
              <div class="icon">📦</div>
              <p>${typeof t === 'function' ? (t('account.no_orders') || 'No orders yet.') : 'No orders yet.'}</p>
              <a href="shop.html" class="btn btn-primary">${typeof t === 'function' ? (t('account.browse') || 'Browse Products') : 'Browse Products'}</a>
            </div>`;
          return;
        }

        const localeMap = { 'zhHK': 'zh-HK', 'pt-BR': 'pt-BR', 'es': 'es-MX', 'en': 'en-US' };
        const locale = localeMap[typeof getLang === 'function' ? getLang() : 'en'] || 'en-US';

        container.innerHTML = data.orders.map(order => {
          const date = new Date(order.created_at).toLocaleDateString(locale, {
            year: 'numeric', month: 'long', day: 'numeric'
          });
          const statusClass = order.status.toLowerCase();

          return `
            <div class="order-card">
              <div class="order-header">
                <div>
                  <div class="order-number">#${order.order_number}</div>
                  <div class="order-date">${date}</div>
                </div>
                <span class="order-status ${statusClass}">${getStatusLabel(order.status)}</span>
              </div>
              <div class="order-items">
                ${order.items.map(item => `
                  <div class="order-item">
                    <div class="order-item-info">
                      <div class="order-item-img">🧴</div>
                      <div>
                        <div class="order-item-name">${item.product_name}</div>
                        <div class="order-item-brand">${item.brand_name}</div>
                      </div>
                    </div>
                    <div class="order-item-price">${item.quantity} × ${formatPrice(item.price)}</div>
                  </div>
                `).join('')}
              </div>
              <div class="order-footer">
                <span class="order-total">${typeof t === 'function' ? (t('checkout.total') || 'Total') : 'Total'}: ${order.currency === 'BRL' ? 'R$' : order.currency === 'MXN' ? 'MX$' : '$'}${order.total.toFixed(2)}</span>
              </div>
            </div>
          `;
        }).join('');
      } catch (err) {
        container.innerHTML = `<div class="empty-state"><p>${typeof t === 'function' ? (t('account.load_failed') || 'Failed to load orders.') : 'Failed to load orders.'} ${err.message}</p></div>`;
      }
    }

    // Logout
    document.getElementById('logout-btn').addEventListener('click', () => {
      Auth.logout();
      window.location.href = 'index.html';
    });

    // Init
    loadProfile();
    loadOrders();
  </script>
</body>
</html>

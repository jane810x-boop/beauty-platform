<div class="reading-progress" id="reading-progress" aria-hidden="true"><div class="reading-progress-bar" id="reading-progress-bar"></div></div>

<div id="header-mount" data-nav=""></div>

<section class="article-hero" id="article-hero">
  <div class="container">

      <a href="index.html">F&J</a> <span>/</span>

      <span>/</span>

    </div>

  <button class="share-btn" onclick="shareArticle('twitter')" aria-label="X" title="X">𝕏</button>

    <h3 data-i18n="article.related_articles" data-i18n-en="You might also like">你可能會喜歡</h3>

  </div>
</div>

<section class="blog-newsletter">
  <div class="container">
    <span class="newsletter-eyebrow">F&J · NEWSLETTER</span>
    <h2 data-i18n="blog.newsletter_title" data-i18n-en="Subscribe to the F&J Beauty Letter">訂閱 F&J 美妝通訊</h2>
    <p data-i18n="blog.newsletter_desc" data-i18n-en="Skincare tips, new arrivals, and exclusive offers — every week, in your inbox.">每周護膚技巧、新品速遞與獨家優惠，直接送達你的郵箱。</p>
    <form class="newsletter-form" id="article-newsletter-form" onsubmit="return subscribeNewsletter(event,'article-newsletter-email','article-newsletter-msg')">
      <input type="email" id="article-newsletter-email" data-i18n-placeholder="blog.newsletter_email" placeholder="輸入你的郵箱" required>
      <button type="submit" class="btn btn-primary" data-i18n="blog.subscribe" data-i18n-en="Subscribe">訂閱</button>
    </form>
    <p class="newsletter-msg" id="article-newsletter-msg" role="status"></p>
  </div>
</section>

<div style="text-align:center;padding:3rem 0;">
  <a href="blog.html" class="btn btn-outline" data-i18n="article.back" data-i18n-en="← Back to Learn">← 返回美妝學堂</a>
</div>

<div id="footer-mount"></div>

<script>
function getLang() { return window.currentLang || localStorage.getItem('fj-lang') || 'en'; }
function tKey(key, lang) {
  const d = window.i18nData;
  if (d && d[lang] && d[lang][key]) return d[lang][key];
  return key;
}
function reI18n() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const k = el.getAttribute('data-i18n');
    const v = tKey(k, getLang());
    if (v && v !== k) el.textContent = v;
  });
}

function renderArticle() {
  const slug = new URLSearchParams(location.search).get('slug');
  const lang = getLang();
  if (!slug || typeof blogArticles === 'undefined') {
    document.getElementById('article-title').textContent = t('blog.article_not_found');
    return;
  }
  const a = blogArticles.find(a => a.slug === slug);
  if (!a) {
    document.getElementById('article-title').textContent = t('blog.article_not_found');
    document.getElementById('article-body').innerHTML = '<p>' + t('blog.article_not_found') + '. <a href="blog.html">' + t('blog.back_to_blog') + '</a>.</p>';
    return;
  }

  const c = a.content[lang] || a.content['en'] || a.content['pt-BR'] || a.content['zhHK'];
  const catInfo = BLOG_CATEGORIES[a.category];
  const catName = catInfo ? (catInfo[lang] || catInfo['pt-BR'] || catInfo['en']).name : a.category;
  const authorName = a.author[lang] || a.author['en'] || a.author['pt-BR'] || a.author['zhHK'];
  window.__currentArticle = { slug: a.slug, title: c.title };

  document.title = 'F&J — ' + c.title;
  document.querySelector('meta[name="description"]').content = c.excerpt;
  document.querySelector('meta[property="og:title"]').content = c.title;
  document.querySelector('meta[property="og:description"]').content = c.excerpt;
  document.querySelector('meta[property="og:url"]').content = 'https://fjbeauty.com/article.html?slug=' + a.slug;
  document.querySelector('link[rel="canonical"]').href = 'https://fjbeauty.com/article.html?slug=' + a.slug;

  document.getElementById('breadcrumb-title').textContent = c.title;
  document.getElementById('article-cover-cat').textContent = catName;
  document.getElementById('article-title').textContent = c.title;

  const dateStr = new Date(a.date).toLocaleDateString(lang === 'zhHK' ? 'zh-HK' : lang === 'pt-BR' ? 'pt-BR' : 'en-US', {year:'numeric',month:'long',day:'numeric'});
  document.getElementById('article-meta').innerHTML = `
    <span>${tKey('article.by', lang)} ${authorName}</span>
    <span>${new Date(a.date).toLocaleDateString(lang === 'zhHK' ? 'zh-HK' : lang === 'pt-BR' ? 'pt-BR' : 'en-US', {year:'numeric',month:'long',day:'numeric'})}</span>
    <span>${t('blog.min_read').replace('{min}', a.readTime)}</span>
  `;

  document.getElementById('author-name').textContent = authorName;
  document.getElementById('author-bio').textContent = tKey('article.author_bio', lang);

  document.getElementById('article-body').innerHTML = c.body;

  // Tags
  const tags = a.tags[lang] || a.tags['en'] || a.tags['pt-BR'] || a.tags['zhHK'] || [];
  document.getElementById('tag-list').innerHTML = tags.map(t => `<a href="blog.html?cat=${a.category}">#${t}</a>`).join('');

  // FAQ
  const faq = a.faq && (a.faq[lang] || a.faq['pt-BR'] || a.faq['en']);
  if (faq && faq.length) {
    document.getElementById('faq-section').style.display = '';
    document.getElementById('faq-list').innerHTML = faq.map((item, i) =>
      `<div class="faq-item" onclick="this.classList.toggle('open')">
        <div class="faq-q">${item.q}</div>
        <div class="faq-a">${item.a}</div>
      </div>`).join('');
  }

  // Related products
  const dataSource = allProducts || PRODUCTS;
  if (a.relatedProducts && a.relatedProducts.length && typeof dataSource !== 'undefined' && dataSource.length > 0) {
    document.getElementById('article-products-section').style.display = '';
    document.getElementById('product-cards-row').innerHTML = a.relatedProducts.map(slug => {
      const p = dataSource.find(p => p.id === slug);
      if (!p) return '';
      return `<a href="product.html?id=${p.id}" class="product-mini-card">
        <img src="${p.image || 'images/placeholder.svg'}" alt="${p.name}" loading="lazy" onerror="this.src='images/placeholder.svg'">
        <div class="name">${p.name}</div>
        <div class="brand">${getBrand(p.brand) ? getBrand(p.brand).name : p.brand}</div>
      </a>`;
    }).join('');
  }

  // Related articles
  const related = blogArticles.filter(ra => ra.slug !== slug && ra.category === a.category).slice(0, 3);
  if (related.length) {
    document.getElementById('related-articles-section').style.display = '';
    document.getElementById('related-grid').innerHTML = related.map(ra => {
      const rc = ra.content[lang] || ra.content['pt-BR'] || ra.content['en'];
      return `<article class="article-card" onclick="location.href='article.html?slug=${ra.slug}'">
        <div class="article-card-cover" style="background:${ra.coverGradient}"><span class="cover-icon">${catInfo?.coverIcon || 'K'}</span></div>
        <div class="article-card-body">
          <span class="article-card-cat">${catName}</span>
          <h3 class="article-card-title">${rc.title}</h3>
          <p class="article-card-excerpt">${rc.excerpt}</p>
          <div class="article-card-meta"><span>${t('blog.min_read').replace('{min}', ra.readTime)}</span></div>
        </div>
      </article>`;
    }).join('');
  }

  // JSON-LD Structured Data
  const ld = {
    '@context': 'https://schema.org',
    '@type': 'Article',
    headline: c.title,
    description: c.excerpt,
    datePublished: a.date,
    author: { '@type': 'Organization', name: 'Equipe F&J' },
    publisher: { '@type': 'Organization', name: 'F&J', logo: { '@type': 'ImageObject', url: 'https://fjbeauty.com/images/logo.png' } },
    mainEntityOfPage: { '@type': 'WebPage', '@id': 'https://fjbeauty.com/article.html?slug=' + a.slug }
  };

  // FAQ schema
  if (faq && faq.length) {
    ld['@graph'] = [ld, {
      '@context': 'https://schema.org',
      '@type': 'FAQPage',
      mainEntity: faq.map(f => ({ '@type': 'Question', name: f.q, acceptedAnswer: { '@type': 'Answer', text: f.a } }))
    }];
  }

  document.getElementById('article-ld').textContent = JSON.stringify(ld, null, 2);

  reI18n();
}

/* ===== Share / Progress / Newsletter ===== */
function shareArticle(network) {
  const lang = getLang();
  const url = location.href;
  const title = (window.__currentArticle && window.__currentArticle.title) || document.title;
  if (network === 'copy') {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(url).then(() => toast(tKey('article.link_copied', lang)));
    } else {
      const ta = document.createElement('textarea'); ta.value = url; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove(); toast(tKey('article.link_copied', lang));
    }
    return;
  }
  let shareUrl = '';
  if (network === 'facebook') shareUrl = 'https://www.facebook.com/sharer/sharer.php?u=' + encodeURIComponent(url);
  else if (network === 'twitter') shareUrl = 'https://twitter.com/intent/tweet?url=' + encodeURIComponent(url) + '&text=' + encodeURIComponent(title);
  else if (network === 'pinterest') shareUrl = 'https://pinterest.com/pin/create/button/?url=' + encodeURIComponent(url) + '&description=' + encodeURIComponent(title);
  if (shareUrl) window.open(shareUrl, '_blank', 'width=600,height=500');
}

function toast(msg) {
  let t = document.getElementById('fj-toast');
  if (!t) { t = document.createElement('div'); t.id = 'fj-toast'; t.className = 'fj-toast'; document.body.appendChild(t); }
  t.textContent = msg; t.classList.add('show');
  clearTimeout(window.__toastTimer);
  window.__toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

function updateReadingProgress() {
  const bar = document.getElementById('reading-progress-bar');
  const body = document.getElementById('article-body');
  if (!bar || !body) return;
  const start = body.getBoundingClientRect().top + window.scrollY;
  const total = body.offsetHeight;
  const scrolled = window.scrollY - start;
  const pct = Math.max(0, Math.min(100, (scrolled / total) * 100));
  bar.style.width = pct + '%';
}

function subscribeNewsletter(e, inputId, msgId) {
  e.preventDefault();
  const lang = getLang();
  const input = document.getElementById(inputId);
  const msg = document.getElementById(msgId);
  const val = (input.value || '').trim();
  const ok = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(val);
  if (!ok) { msg.textContent = tKey('blog.newsletter_error', lang); msg.className = 'newsletter-msg error'; return false; }
  msg.textContent = tKey('blog.newsletter_success', lang); msg.className = 'newsletter-msg success';
  input.value = '';
  return false;
}

document.addEventListener('DOMContentLoaded', async function() {
  // 異步初始化產品數據（確保後台新增產品在關聯產品中可顯示）
  if (typeof ProductAPI !== 'undefined') {
    allProducts = await ProductAPI.getAllProducts();
  } else {
    allProducts = PRODUCTS;
  }
  if (typeof blogArticles !== 'undefined') renderArticle();
  window.addEventListener('scroll', updateReadingProgress);
  updateReadingProgress();
  setTimeout(updateReadingProgress, 300);
  updateCartCount();
});

function updateCartCount() {
  try {
    const cart = JSON.parse(localStorage.getItem('fj_cart') || '[]');
    document.getElementById('cart-count').textContent = cart.reduce((s,i) => s + i.qty, 0);
  } catch(e) {}
}

try {
  const token = localStorage.getItem('fj_token');
  if (token) {
    document.getElementById('header-user-menu').style.display = '';
    document.getElementById('header-login-btn').style.display = 'none';
  }
} catch(e) {}
</script>

<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title data-al="Dashboard">儀表盤 — F&J 后台管理</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/admin.css">
</head>
<body>
<div class="admin-layout">
  <!-- Sidebar -->
  <aside class="admin-sidebar">
    <a href="index.html" class="sidebar-logo">F<span>&amp;</span>J <span data-al="Admin">管理</span></a>
    <nav class="sidebar-nav">
      <a href="index.html" class="active"><span class="icon">📊</span> <span data-al="Dashboard">儀表盤</span></a>
      <a href="products.html"><span class="icon">📦</span> <span data-al="Products">商品管理</span></a>
      <a href="orders.html"><span class="icon">📋</span> <span data-al="Orders">訂單管理</span></a>
      <a href="articles.html"><span class="icon">📝</span> <span data-al="Articles">文章管理</span></a>
      <a href="../index.html" target="_blank"><span class="icon">🏪</span> <span data-al="View Store →">查看商城 →</span></a>
    </nav>
    <button class="lang-toggle" id="lang-toggle" onclick="AdminLang.toggle()">
      <span class="lang-icon">🌐</span> <span>EN</span>
    </button>
    <div class="sidebar-footer">F&J Beauty v1.0</div>
  </aside>

  <!-- Main -->
  <main class="admin-main">
    <div class="admin-header">
      <h1 data-al="Dashboard">儀表盤</h1>
      <div class="admin-user">
        <span id="admin-name" data-al="Admin">管理員</span>
        <button class="logout-btn" onclick="Admin.clearAuth();window.location.href='login.html';" data-al="Logout">退出登录</button>
      </div>
    </div>

    <div class="toast" id="toast"></div>

    <!-- Stats -->
    <div class="stats-grid" id="stats-grid">
      <div class="loading" data-al="Loading dashboard...">正在加載儀表盤...</div>
    </div>

    <!-- Recent Orders -->
    <h2 style="margin-bottom:1rem;" data-al="Recent Orders">最近訂單</h2>
    <div class="admin-table" id="recent-orders-table"></div>
  </main>
</div>

<script src="js/admin-lang.js"></script>
<script src="js/admin.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  AdminLang.init();
});

if (!Admin.checkAuth()) throw new Error('Not authenticated');

function _t(key) { return Admin._(key); }

async function loadDashboard() {
  try {
    const data = await Admin.api('GET', '/stats');
    const s = data.stats;

    document.getElementById('admin-name').textContent = _t('Admin');

    document.getElementById('stats-grid').innerHTML = `
      <div class="stat-card">
        <div class="stat-icon">📦</div>
        <div class="stat-label">${_t('Total Orders')}</div>
        <div class="stat-value">${s.totalOrders}</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">💰</div>
        <div class="stat-label">${_t('Total Revenue')}</div>
        <div class="stat-value">$${s.totalRevenue.toFixed(2)}</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">🛍️</div>
        <div class="stat-label">${_t('Active Products')}</div>
        <div class="stat-value">${s.totalProducts}</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">👥</div>
        <div class="stat-label">${_t('Registered Users')}</div>
        <div class="stat-value">${s.totalUsers}</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">⏳</div>
        <div class="stat-label">${_t('Pending Orders')}</div>
        <div class="stat-value">${s.pendingOrders}</div>
      </div>
    `;

    // Recent orders table
    if (data.recentOrders && data.recentOrders.length > 0) {
      document.getElementById('recent-orders-table').innerHTML = `
        <table>
          <thead>
            <tr>
              <th>${_t('Order #')}</th>
              <th>${_t('Customer')}</th>
              <th>${_t('Total')}</th>
              <th>${_t('Status')}</th>
              <th>${_t('Date')}</th>
            </tr>
          </thead>
          <tbody>
            ${data.recentOrders.map(o => `
              <tr>
                <td><strong>#${o.order_number}</strong></td>
                <td>${o.shipping_name || _t('N/A')}</td>
                <td>$${o.total.toFixed(2)}</td>
                <td><span class="badge ${o.status}">${Admin.statusLabel(o.status)}</span></td>
                <td>${new Date(o.created_at).toLocaleDateString('zh-CN')}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>`;
    } else {
      document.getElementById('recent-orders-table').innerHTML = `<div class="loading">${_t('No orders yet.')}</div>`;
    }
  } catch (err) {
    document.getElementById('stats-grid').innerHTML = `<div class="loading">${_t('Failed to load:')} ${err.message}</div>`;
  }
}

// Re-render on language change
window.addEventListener('admin-lang-changed', loadDashboard);

loadDashboard();
</script>
</body>
</html>

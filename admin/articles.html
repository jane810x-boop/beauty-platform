<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title data-al="Article Management">文章管理 — F&J 后台管理</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/admin.css">
</head>
<body>
<div class="admin-layout">
  <aside class="admin-sidebar">
    <a href="index.html" class="sidebar-logo">F<span>&amp;</span>J <span data-al="Admin">管理</span></a>
    <nav class="sidebar-nav">
      <a href="index.html"><span class="icon">📊</span> <span data-al="Dashboard">儀表盤</span></a>
      <a href="products.html"><span class="icon">📦</span> <span data-al="Products">商品管理</span></a>
      <a href="orders.html"><span class="icon">📋</span> <span data-al="Orders">訂單管理</span></a>
      <a href="articles.html" class="active"><span class="icon">📝</span> <span data-al="Articles">文章管理</span></a>
      <a href="../index.html" target="_blank"><span class="icon">🏪</span> <span data-al="View Store →">查看商城 →</span></a>
    </nav>
    <button class="lang-toggle" id="lang-toggle" onclick="AdminLang.toggle()">
      <span class="lang-icon">🌐</span> <span>EN</span>
    </button>
    <div class="sidebar-footer">F&J Beauty v1.0</div>
  </aside>

  <main class="admin-main">
    <div class="admin-header">
      <h1 data-al="Article Management">文章管理</h1>
    </div>

    <div class="toast" id="toast"></div>

    <div class="search-bar">
      <input type="text" id="search" data-al-placeholder="Search articles..." placeholder="搜索文章..." oninput="filterArticles()">
      <select id="category-filter" onchange="filterArticles()" style="padding:0.65rem 0.75rem;border:1.5px solid var(--admin-border);border-radius:6px;font-family:inherit;font-size:0.9rem;min-width:150px;">
        <option value="all" data-al="All Categories">全部分類</option>
        <option value="k-beauty-101">K-Beauty 101</option>
        <option value="guia-de-ingredientes">Ingredient Guide</option>
        <option value="rotinas">Routines</option>
      </select>
    </div>

    <div class="admin-table" id="articles-table">
      <div class="loading" data-al="Loading articles...">正在加載文章...</div>
    </div>
  </main>
</div>

<script src="../js/blog-data.js"></script>
<script src="js/admin-lang.js"></script>
<script src="js/admin.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  AdminLang.init();
});

if (!Admin.checkAuth()) throw new Error('Not authenticated');

function _t(key) { return Admin._(key); }

let allArticles = [];

// Add status field to articles if not present
function ensureArticleStatus(articles) {
  return articles.map(a => ({
    ...a,
    status: a.status || 'published'
  }));
}

function getCategoryName(categorySlug) {
  if (!BLOG_CATEGORIES || !BLOG_CATEGORIES[categorySlug]) return categorySlug;
  const cat = BLOG_CATEGORIES[categorySlug];
  const lang = AdminLang.current === 'zhHK' ? 'zhHK' : 'en';
  return (cat[lang] && cat[lang].name) ? cat[lang].name : cat.en.name;
}

function getArticleTitle(article) {
  if (!article.content) return article.slug;
  const lang = AdminLang.current === 'zhHK' ? 'zhHK' : 'en';
  if (article.content[lang] && article.content[lang].title) {
    return article.content[lang].title;
  }
  // Fallback to English
  if (article.content.en && article.content.en.title) {
    return article.content.en.title;
  }
  return article.slug;
}

function loadArticles() {
  try {
    allArticles = ensureArticleStatus(blogArticles);
    renderArticles(allArticles);
  } catch (err) {
    document.getElementById('articles-table').innerHTML = `<div class="loading">${_t('Failed to load:')} ${err.message}</div>`;
  }
}

function renderArticles(articles) {
  if (!articles.length) {
    document.getElementById('articles-table').innerHTML = `<div class="loading">${_t('No articles found.')}</div>`;
    return;
  }

  const statusLabel = { published: _t('Published'), draft: _t('Draft') };

  document.getElementById('articles-table').innerHTML = `
    <table>
      <thead>
        <tr>
          <th>${_t('Title')}</th>
          <th>${_t('Category')}</th>
          <th>${_t('Date')}</th>
          <th>${_t('Read')}</th>
          <th>${_t('Status')}</th>
          <th>${_t('Actions')}</th>
        </tr>
      </thead>
      <tbody>
        ${articles.map(a => {
          const title = getArticleTitle(a);
          const shortTitle = title.length > 50 ? title.substring(0, 50) + '...' : title;
          return `
          <tr>
            <td><strong title="${title.replace(/"/g, '&quot;')}">${shortTitle}</strong></td>
            <td>${getCategoryName(a.category)}</td>
            <td>${a.date}</td>
            <td>${a.readTime} min</td>
            <td>
              <span class="badge ${a.status === 'published' ? 'paid' : 'pending'}"
                    style="cursor:pointer;"
                    onclick="toggleStatus('${a.slug}')"
                    title="${_t('Click to toggle')}">
                ${a.status === 'published' ? statusLabel.published : statusLabel.draft}
              </span>
            </td>
            <td>
              <button class="btn-sm outline" onclick="editArticle('${a.slug}')">${_t('Edit')}</button>
              <button class="btn-sm danger" onclick="deleteArticle('${a.slug}')">${_t('Delete')}</button>
            </td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>`;
}

function filterArticles() {
  const q = document.getElementById('search').value.toLowerCase();
  const cat = document.getElementById('category-filter').value;
  let filtered = allArticles;
  if (cat !== 'all') {
    filtered = filtered.filter(a => a.category === cat);
  }
  if (q) {
    filtered = filtered.filter(a => {
      const title = getArticleTitle(a).toLowerCase();
      const catName = getCategoryName(a.category).toLowerCase();
      return title.includes(q) || catName.includes(q) || a.slug.toLowerCase().includes(q);
    });
  }
  renderArticles(filtered);
}

function toggleStatus(slug) {
  const article = allArticles.find(a => a.slug === slug);
  if (!article) return;
  article.status = article.status === 'published' ? 'draft' : 'published';
  Admin.showToast(_t('Article status updated (display only)'));
  renderArticles(allArticles);
  filterArticles();
}

function editArticle(slug) {
  Admin.showToast(_t('Edit not implemented (static data)'));
}

function deleteArticle(slug) {
  if (confirm(_t('Delete this article? (display only)'))) {
    Admin.showToast(_t('Delete not implemented (static data)'));
  }
}

// Re-render on language change
window.addEventListener('admin-lang-changed', () => {
  // Update category filter options
  const sel = document.getElementById('category-filter');
  if (sel) {
    Array.from(sel.options).forEach(opt => {
      if (opt.value !== 'all') {
        opt.textContent = getCategoryName(opt.value);
      }
    });
  }
  renderArticles(allArticles);
});

// Init
loadArticles();
</script>
</body>
</html>
